services:
  db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  redis-socketio:
    image: redis:7-alpine

  configurator:
    image: ${FRAPPE_IMAGE}
    depends_on:
      db:
        condition: service_healthy
    working_dir: /home/frappe/frappe-bench
    command: >
      bash -lc "
      bench set-config -g db_host ${DB_HOST} &&
      bench set-config -gp db_port ${DB_PORT} &&
      bench set-config -g redis_cache redis://redis-cache:6379 &&
      bench set-config -g redis_queue redis://redis-queue:6379 &&
      bench set-config -g redis_socketio redis://redis-socketio:6379 &&
      bench set-config -g socketio_port 9000
      "
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  create-site:
    image: ${FRAPPE_IMAGE}
    depends_on:
      configurator:
        condition: service_completed_successfully
    working_dir: /home/frappe/frappe-bench
    command: >
      bash -lc "
      until (echo > /dev/tcp/${DB_HOST}/${DB_PORT}) >/dev/null 2>&1; do sleep 2; done;
      if [ ! -d sites/${SITE_NAME} ]; then
        bench new-site ${SITE_NAME} --no-mariadb-socket --mariadb-root-password ${DB_ROOT_PASSWORD} --admin-password ${ADMIN_PASSWORD} --db-name ${DB_NAME};
      fi;
      /home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/lending;
      echo frappe > sites/apps.txt;
      echo erpnext >> sites/apps.txt;
      echo lending >> sites/apps.txt;
      bench --site ${SITE_NAME} install-app erpnext || true;
      bench --site ${SITE_NAME} install-app lending || true;
      bench use ${SITE_NAME};
      "
    volumes:
      - ./:/home/frappe/frappe-bench/apps/lending
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  backend:
    image: ${FRAPPE_IMAGE}
    depends_on:
      create-site:
        condition: service_completed_successfully
    working_dir: /home/frappe/frappe-bench
    command: >
      bash -lc "/home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/lending && bench use ${SITE_NAME} && bench serve --port 8000 --noreload"
    volumes:
      - ./:/home/frappe/frappe-bench/apps/lending
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8000:8000"

  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
      args:
        FRAPPE_IMAGE: ${FRAPPE_IMAGE}
    depends_on:
      backend:
        condition: service_started
    working_dir: /home/frappe/frappe-bench
    command: >
      bash -lc "/home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/lending && node apps/frappe/socketio.js"
    volumes:
      - ./:/home/frappe/frappe-bench/apps/lending
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  queue-short:
    image: ${FRAPPE_IMAGE}
    depends_on:
      backend:
        condition: service_started
    working_dir: /home/frappe/frappe-bench
    command: >
      bash -lc "/home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/lending && bench worker --queue short,default"
    volumes:
      - ./:/home/frappe/frappe-bench/apps/lending
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  queue-long:
    image: ${FRAPPE_IMAGE}
    depends_on:
      backend:
        condition: service_started
    working_dir: /home/frappe/frappe-bench
    command: >
      bash -lc "/home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/lending && bench worker --queue long,default,short"
    volumes:
      - ./:/home/frappe/frappe-bench/apps/lending
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  scheduler:
    image: ${FRAPPE_IMAGE}
    depends_on:
      backend:
        condition: service_started
    working_dir: /home/frappe/frappe-bench
    command: >
      bash -lc "/home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/lending && bench schedule"
    volumes:
      - ./:/home/frappe/frappe-bench/apps/lending
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  lending-mcp:
    build:
      context: ./lending-mcp
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      FRAPPE_API_URL: http://backend:8000
      FRAPPE_SITE_NAME: ${SITE_NAME}
    ports:
      - "${MCP_PORT:-8080}:8080"

volumes:
  db-data:
  sites:
  logs:

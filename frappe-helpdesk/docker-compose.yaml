services:
  mariadb:
    image: mariadb:10.8
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:alpine

  frappe:
    image: frappe/bench:latest
    user: root
    command: bash /workspace/docker/init-local.sh
    environment:
      SHELL: /bin/bash
    working_dir: /home/frappe
    volumes:
      - .:/workspace
      - helpdesk-desk-node-modules:/workspace/desk/node_modules
      - yarn-cache:/home/frappe/.cache/yarn
    ports:
      - "8100:8000"
      - "9100:9000"

  helpdesk-mcp:
    build:
      context: ./helpdesk-mcp
    depends_on:
      - frappe
    env_file:
      - .env
    environment:
      FRAPPE_API_URL: http://frappe:8000
      FRAPPE_SITE_NAME: helpdesk.localhost
    ports:
      - "127.0.0.1:${MCP_PORT:-8081}:8080"

volumes:
  mariadb-data:
  helpdesk-desk-node-modules:
  yarn-cache:
